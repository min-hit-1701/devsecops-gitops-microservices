# ============================================================
# SonarQube Quality Gate Configuration
# ============================================================
# Initialize Quality Gate in SonarQube with the following conditions
# Located in: Administration > Quality Gates > Create
# ============================================================

name: "DevSecOps Security Gate"

conditions:
  # Security issues (Blocker + Critical Security Issues)
  - metric: security_rating
    op: GT
    error: "3"        # A=1, B=2, C=3 → Block if worse than C

  # Reliability issues
  - metric: reliability_rating
    op: GT
    error: "3"

  # Code coverage on new code  
  - metric: new_coverage
    op: LT
    error: "50"       # At least 50% coverage on new code

  # Duplicated lines on new code
  - metric: new_duplicated_lines_density
    op: GT
    error: "10"       # Max 10% duplication on new code

  # Maintainability rating
  - metric: new_maintainability_rating
    op: GT
    error: "3"
