# Prometheus Alerting Rules — Retail Store DevSecOps
# Applied via Helm: kube-prometheus-stack
# kubectl apply -f alerts.yaml -n monitoring

apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: retail-store-alerts
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
    app.kubernetes.io/part-of: retail-store
spec:
  groups:
    - name: node-alerts
      rules:
        - alert: NodeDown
          expr: up{job="node-exporter"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Node {{ $labels.instance }} is down"
            description: "Node has been unreachable for more than 5 minutes."

        - alert: HighCPUUsage
          expr: 100 - (avg(rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "High CPU usage on {{ $labels.instance }}"
            description: "CPU usage is above 80% for more than 10 minutes (current: {{ $value }}%)."

        - alert: HighMemoryUsage
          expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "High memory usage on {{ $labels.instance }}"
            description: "Memory usage is above 85% for more than 10 minutes (current: {{ $value }}%)."

        - alert: DiskFilling
          expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 10
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Disk almost full on {{ $labels.instance }}"
            description: "Only {{ $value }}% disk space remaining on root partition."

    - name: pod-alerts
      rules:
        - alert: PodCrashLooping
          expr: rate(kube_pod_container_status_restarts_total[15m]) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.pod }} is crash looping"
            description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has restarted {{ $value }} times in the last 15 minutes."

        - alert: PodNotReady
          expr: sum(kube_pod_status_phase{phase!="Running",phase!="Succeeded"}) by (namespace, pod) > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is not Ready"
            description: "Pod has been in {{ $labels.phase }} state for more than 10 minutes."

        - alert: TooManyRestarts
          expr: kube_pod_container_status_restarts_total > 10
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.pod }} has high restart count"
            description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} (container: {{ $labels.container }}) has restarted {{ $value }} times."

    - name: cluster-alerts
      rules:
        - alert: KubeAPIDown
          expr: up{job="kubernetes-apiservers"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Kubernetes API server is down"
            description: "API server has been unreachable for more than 5 minutes."

        - alert: KubeNodeNotReady
          expr: kube_node_status_condition{condition="Ready",status="true"} == 0
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: "Node {{ $labels.node }} is NotReady"
            description: "Node has been NotReady for more than 10 minutes."

        - alert: ETCDDown
          expr: up{job="kube-etcd"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "ETCD is down"
            description: "ETCD has been unreachable for more than 5 minutes."

    - name: application-alerts
      rules:
        - alert: ServiceDownAlert
          expr: up{job=~"ui|carts|orders|catalog|checkout"} == 0
          for: 3m
          labels:
            severity: critical
          annotations:
            summary: "Service {{ $labels.job }} is down"
            description: "Service {{ $labels.job }} has been unreachable for more than 3 minutes."

        - alert: HighErrorRate
          expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High 5xx error rate on {{ $labels.service }}"
            description: "Error rate is {{ $value | humanizePercentage }} for service {{ $labels.service }}."
